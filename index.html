
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AKASHA by Del Gruiner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080000;font-family:Georgia,serif;color:#fff;min-height:100vh}
.hero{background:radial-gradient(ellipse at 50% 0%,rgba(255,0,34,.2),transparent 60%);text-align:center;padding:60px 20px 40px}
.flame{font-size:60px;filter:drop-shadow(0 0 20px #FF0022);margin-bottom:16px}
h1{font-size:52px;font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#FF0022,#FF3355,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#D4AF37;font-size:13px;letter-spacing:5px;margin:8px 0 16px}
.tagline{color:#885566;font-size:14px;margin-bottom:40px}
.btn{display:inline-block;background:linear-gradient(135deg,#8B0000,#FF0022,#D4AF37);color:#fff;padding:16px 36px;border-radius:14px;font-size:17px;font-weight:900;letter-spacing:2px;text-decoration:none;box-shadow:0 8px 40px rgba(255,0,34,.4);margin:8px}
.btn2{background:transparent;border:1px solid #D4AF37;color:#D4AF37}
.services{padding:40px 16px;max-width:600px;margin:0 auto}
.sec-title{color:#D4AF37;font-size:11px;letter-spacing:3px;margin-bottom:20px;text-align:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#100005;border:1px solid #2A0010;border-radius:16px;padding:18px}
.card-icon{font-size:30px;margin-bottom:8px}
.card-title{color:#fff;font-weight:700;font-size:13px;font-family:Arial,sans-serif}
.card-desc{color:#885566;font-size:11px;margin-top:4px;font-family:Arial,sans-serif}
.plans{padding:40px 16px;max-width:600px;margin:0 auto}
.plan{background:#100005;border:2px solid #2A0010;border-radius:18px;padding:24px;margin-bottom:14px}
.plan.popular{border-color:#D4AF37}
.plan-name{color:#D4AF37;font-weight:700;font-size:14px;letter-spacing:1px;font-family:Arial,sans-serif}
.plan-price{color:#D4AF37;font-size:32px;font-weight:900;margin:8px 0 4px}
.plan-period{color:#885566;font-size:12px;font-family:Arial,sans-serif}
.plan-features{list-style:none;margin:14px 0}
.plan-features li{color:#FFF8E1;font-size:12px;padding:5px 0;border-bottom:1px solid #2A0010;font-family:Arial,sans-serif}
.plan-features li:before{content:"✓ ";color:#D4AF37}
.pay-box{background:rgba(255,0,34,.06);border:1px solid rgba(255,0,34,.3);border-radius:14px;padding:20px;margin-top:16px}
.pay-title{color:#FF0022;font-size:12px;letter-spacing:2px;margin-bottom:14px;font-family:Arial,sans-serif;font-weight:700}
.pay-btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-weight:900;font-size:14px;cursor:pointer;margin-bottom:10px;letter-spacing:1px;text-align:center;text-decoration:none}
.mtn{background:linear-gradient(135deg,#FFCC00,#FF9900);color:#000}
.moov{background:linear-gradient(135deg,#0066CC,#0044AA);color:#fff}
.pay-num{font-size:16px;font-weight:900;margin-top:4px}
.pay-inst{color:#885566;font-size:11px;margin-top:8px;font-family:Arial,sans-serif;line-height:1.6}
.footer{text-align:center;padding:30px 20px;border-top:1px solid #2A0010;color:#885566;font-size:12px;font-family:Arial,sans-serif}
.gold{color:#D4AF37}
.revenue{background:rgba(255,0,34,.06);border:1px solid rgba(255,0,34,.2);border-radius:16px;padding:20px;margin:0 16px 20px;max-width:600px;margin-left:auto;margin-right:auto}
.rev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;margin-top:14px}
.rev-box{background:rgba(255,255,255,.03);border-radius:10px;padding:12px}
.rev-num{color:#D4AF37;font-size:18px;font-weight:900}
.rev-label{color:#885566;font-size:10px;font-family:Arial,sans-serif}
.rev-amount{color:#FF0022;font-size:12px;font-weight:700;margin-top:4px;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div class="hero">
<div class="flame">🔥</div>
<h1>AKASHA</h1>
<p class="sub">by Del Gruiner</p>
<p class="tagline">La super-app de Cotonou & du Bénin</p>
